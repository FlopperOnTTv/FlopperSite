<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Site</title>
    <style>
        /* Basic reset */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Roboto', sans-serif;
            background-color: #222; /* Dark background for contrast */
            color: white;
        }

        /* Navigation */
        header {
            background-color: #333; /* Dark background for navbar */
            padding: 10px;
            text-align: center;
        }

        nav ul {
            list-style-type: none;
            padding: 0;
        }

        nav ul li {
            display: inline;
            margin-right: 20px;
        }

        nav ul li a {
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            padding: 10px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        nav ul li a:hover {
            background-color: #444;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.7); /* Glowing effect */
        }

        /* Main content */
        main {
            text-align: center;
        }

        /* Video container */
        .video-container {
            margin-top: 20px;
            width: 100%;
            height: 100vh; /* Make the video fill the entire viewport */
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Fullscreen video */
        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures the video covers the whole container */
        }

        /* Mute button style */
        .mute-button {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 30px;
            border: none;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .mute-button:hover {
            background-color: rgba(0, 0, 0, 0.7);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            background-color: #333;
        }

        /* Loading spinner */
        .loading-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

    </style>
</head>
<body>

    <header>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/videos">Videos</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Welcome to Your Site</h1>
        <div class="video-container">
            <!-- Mute Button -->
            <button class="mute-button" id="mute-button" onclick="toggleMute()">🔊</button>

            <!-- Video player -->
            <video id="video" autoplay muted loop>
                <source src="https://r2.guns.lol/c9e41ff7-1bb4-4c42-8be7-52b4eeecc921.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>

            <!-- Loading spinner (hidden initially) -->
            <div class="loading-spinner"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 Your Website</p>
    </footer>

    <script>
        // Toggle mute/unmute function
        function toggleMute() {
            const video = document.getElementById('video');
            const muteButton = document.getElementById('mute-button');

            if (video.muted) {
                video.muted = false; // Unmute the video
                muteButton.textContent = "🔊"; // Change icon to "Unmute"
            } else {
                video.muted = true; // Mute the video
                muteButton.textContent = "🔇"; // Change icon to "Mute"
            }
        }

        // Hide loading spinner once the video is ready
        const video = document.querySelector('video');
        const spinner = document.querySelector('.loading-spinner');

        video.addEventListener('canplay', () => {
            spinner.style.display = 'none';
        });
    </script>

</body>
</html>
