<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flopper</title>
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="icon" type="image/x-icon" href="images/default.ico">

    <style>
        /* 1. THE FOUNDATION - No more white screens */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000; /* Force black background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;
        }

        /* 2. THE OVERLAY - High Z-index so you can actually click it */
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            cursor: pointer;
            transition: opacity 0.8s ease;
        }

        #enter-text {
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* 3. THE VIDEO - Covers everything behind the box */
        #video-background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        video {
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.6; /* Makes it look cleaner/darker */
        }

        /* 4. THE COOL SHI - Floating/Drifting Profile Box */
        #blurred-box {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            opacity: 0; /* Starts invisible */
            transition: opacity 1.5s ease;
            
            /* The Animation */
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translate(-50%, -50%) translateY(0px) rotate(0deg); }
            33% { transform: translate(-50%, -50%) translateY(-15px) rotate(1deg); }
            66% { transform: translate(-50%, -50%) translateY(5px) rotate(-1deg); }
            100% { transform: translate(-50%, -50%) translateY(0px) rotate(0deg); }
        }

        #blurred-box img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .links a {
            color: white;
            font-size: 1.5rem;
            margin: 0 10px;
            text-decoration: none;
            transition: 0.3s;
        }

        .links a:hover {
            color: #aaa;
            text-shadow: 0 0 10px white;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="enter-text">Click to Enter</div>
    </div>

    <div id="video-background">
        <video id="myVideo" loop playsinline muted>
            <source src="media/default.mp4" type="video/mp4">
        </video>
    </div>

    <audio id="myAudio" loop>
        <source src="media/default.mp3" type="audio/mpeg">
    </audio>

    <div id="blurred-box">
        <img src="images/default.jpg" alt="Profile Picture">
        <p id="username" style="font-weight: bold; font-size: 1.5rem; margin-bottom: 5px;">flopper</p>
        <div class="user-description">
            <p style="color: #ccc; margin-bottom: 20px;">i do cool shi</p>
        </div>
        <div class="links">
            <a href="https://discordlookup.com/user/1079429643070873740" target="_blank"><i class="fab fa-discord"></i></a> 
            <a href="https://github.com/FlopperOnTTv" target="_blank"><i class="fab fa-github"></i></a> 
            <a href="https://www.youtube.com/@FlopperTv" target="_blank"><i class="fa-brands fa-youtube"></i></a> 
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const audio = document.getElementById("myAudio");
            const video = document.getElementById("myVideo");
            const overlay = document.getElementById("overlay");
            const box = document.getElementById("blurred-box");
            const enterText = document.getElementById("enter-text");
            let dotCount = 0;

            // 1. Initial Setup
            audio.volume = 0.2;

            // 2. Animated Dots
            setInterval(() => {
                dotCount = (dotCount + 1) % 4;
                enterText.textContent = `Click to Enter${'.'.repeat(dotCount)}`;
            }, 500);

            // 3. The Big Moment: Click to Start
            overlay.addEventListener('click', function() {
                // Play media (Crucial: Video starts muted to ensure it plays, we can unmute it if needed)
                video.play().catch(e => console.log("Video Play Error:", e));
                audio.play().catch(e => console.log("Audio Play Error:", e));
                
                // Hide overlay
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    // Reveal the profile box with a fade
                    box.style.opacity = '1';
                }, 800);
            });

            // 4. Tab Visibility Fix (Pause when switching tabs)
            document.addEventListener("visibilitychange", () => {
                if (document.hidden) {
                    video.pause();
                    audio.pause();
                } else if (overlay.style.display === 'none') {
                    video.play();
                    audio.play();
                }
            });
        });
    </script>
</body>
</html>
