<!DOCTYPE html>
<html lang="en">
<head>

      height: 100%;
      width: 100%;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }
    video#bgVideo {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      z-index: -1;
      transform: translate(-50%, -50%);
      background-size: cover;
    }
    audio#bgAudio {
      display: none; /* hide audio element */
    }
  </style>
</head>

  <!-- Background Video -->
  <video id="bgVideo" autoplay muted loop playsinline>

  </video>

  <!-- Background Music -->
  <audio id="bgAudio" loop>
