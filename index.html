<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flppr</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: black;
    }
    video#bgVideo {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      z-index: -1;
      transform: translate(-50%, -50%);
      background-size: cover;
    }
    audio#bgAudio {
      display: none;
    }
  </style>
</head>
<body>

  <!-- Background Video -->
  <video id="bgVideo" autoplay muted loop playsinline>
    <source src="media/default.mp4" type="video/mp4">
  </video>

  <!-- Background Music -->
  <audio id="bgAudio" loop>
    <source src="media/default.mp3" type="audio/mpeg">
  </audio>

  <!-- Your original click-to-enter elements -->
  <div id="clickToEnterContainer">
    <h1>Welcome to Flppr!</h1>
    <button id="enterButton">Click to Enter</button>
  </div>

  <!-- Keep your original click-to-enter script untouched -->
  <script src="originalClickToEnter.js"></script> <!-- Whatever file has your animation -->

  <script>
    // Start audio on first user click without changing your original click behavior
    const enterButton = document.getElementById('enterButton');
    const bgAudio = document.getElementById('bgAudio');

    enterButton.addEventListener('click', () => {
      bgAudio.play().catch(() => {});
      // Call your original function if it exists (animation stays)
      if (typeof clickToEnter === 'function') {
        clickToEnter();
      }
    });
  </script>

</body>
</html>
