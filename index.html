<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flppr</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }
    video#bgVideo {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      z-index: -1;
      transform: translate(-50%, -50%);
      background-size: cover;
    }
    .overlay {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100%;
      color: white;
      text-align: center;
    }
    button.enter-btn {
      padding: 12px 24px;
      font-size: 18px;
      margin-top: 20px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.2);
      color: white;
      transition: background 0.3s;
    }
    button.enter-btn:hover {
      background: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>

  <!-- Background Video -->
  <video id="bgVideo" autoplay muted loop playsinline>
    <source src="media/default.mp4" type="video/mp4">
    Your browser does not support HTML5 video.
  </video>

  <!-- Background Music -->
  <audio id="bgAudio" loop>
    <source src="media/default.mp3" type="audio/mpeg">
    Your browser does not support HTML5 audio.
  </audio>

  <!-- Overlay content -->
  <div class="overlay">
    <h1>Welcome to Flppr!</h1>
    <p>Click below to enter the site</p>
 
    <button class="enter-btn" onclick="originalClickFunction()">Click to Enter</button>
  </div>

  <script>

    function originalClickFunction() {
      // click to enter thingy
      // example placeholder:
      alert("Original Click to Enter behavior");
      
      // start audio safely on user click
      const audio = document.getElementById('bgAudio');
      audio.play().catch(() => console.log('Audio autoplay blocked'));
    }
  </script>

</body>
</html>
